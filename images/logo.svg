<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="120" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F43F8E"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Main Text -->
  <text x="0" y="28" font-family="'Bricolage Grotesque', sans-serif" font-weight="800" font-size="24" fill="#1A0A14" letter-spacing="-0.03em">
    Zara<tspan fill="url(#logoGradient)">.</tspan>
  </text>
  <!-- Subtle minimalist line under "ara" -->
  <rect x="18" y="32" width="22" height="2" rx="1" fill="url(#logoGradient)" opacity="0.6"/>
</svg>
